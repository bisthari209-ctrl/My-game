<!DOCTYPE html>
<html lang="ne">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lucky Draw Dashboard</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <style>
        :root { --primary: #1a1c24; --gold: #f1c40f; --accent: #e74c3c; --success: #27ae60; }
        body { font-family: 'Segoe UI', sans-serif; margin: 0; background: #f4f7f6; color: #333; padding-bottom: 30px; }
        
        .header { background: var(--primary); color: white; padding: 25px 15px; text-align: center; border-radius: 0 0 25px 25px; box-shadow: 0 4px 15px rgba(0,0,0,0.2); position: relative; }
        .balance-chip { background: rgba(255,255,255,0.1); display: inline-flex; align-items: center; gap: 8px; padding: 8px 18px; border-radius: 50px; margin-top: 10px; border: 1px solid var(--gold); }

        .container { padding: 20px 15px; display: grid; grid-template-columns: 1fr 1fr; gap: 15px; }

        .lucky-box {
            background: white; border-radius: 20px; overflow: hidden; position: relative;
            box-shadow: 0 8px 20px rgba(0,0,0,0.08); border: 1px solid #eee; text-align: center;
            padding: 20px 10px; transition: 0.3s;
        }
        .lucky-box:active { transform: scale(0.95); }

        .box-icon { font-size: 3rem; margin-bottom: 10px; display: block; filter: drop-shadow(0 5px 10px rgba(0,0,0,0.1)); }
        .box-title { font-weight: bold; font-size: 0.9rem; color: #444; }
        .box-price { font-size: 1.1rem; font-weight: 800; color: #333; margin: 5px 0; }
        .box-prize { font-size: 0.85rem; color: var(--success); font-weight: bold; margin-bottom: 10px; display: block; }
        
        .btn-join {
            background: linear-gradient(135deg, #f39c12, #e67e22); color: white;
            border: none; padding: 12px; border-radius: 12px; font-weight: bold;
            cursor: pointer; width: 100%; margin-top: 5px;
        }

        /* History Table */
        .history-card { background: white; margin: 15px; border-radius: 15px; padding: 15px; box-shadow: 0 5px 15px rgba(0,0,0,0.05); }
        .history-card h3 { margin-top: 0; font-size: 1rem; border-bottom: 1px solid #eee; padding-bottom: 10px; }
        table { width: 100%; border-collapse: collapse; font-size: 0.8rem; }
        th, td { padding: 10px; text-align: left; border-bottom: 1px solid #f9f9f9; }
        .win-text { color: var(--success); font-weight: bold; }
        .loss-text { color: var(--accent); font-weight: bold; }

        .box-5 { border-top: 5px solid #3498db; }
        .box-20 { border-top: 5px solid #9b59b6; }
        .box-50 { border-top: 5px solid #f1c40f; }
        .box-100 { border-top: 5px solid #e74c3c; }

        .back-btn { position: absolute; left: 15px; top: 25px; color: white; font-size: 1.2rem; text-decoration: none; }
    </style>
</head>
<body>

    <div class="header">
        <a href="profile.html" class="back-btn"><i class="fas fa-arrow-left"></i></a>
        <h2 style="margin:0;">Lucky Box Draw</h2>
        <div class="balance-chip">
            <i class="fas fa-wallet" style="color:var(--gold);"></i>
            <span id="userBalance">रू 0.00</span>
        </div>
    </div>

    <div class="container">
        <div class="lucky-box box-5">
            <span class="box-icon">🎁</span>
            <div class="box-title">Bronze Box</div>
            <div class="box-price">Entry: रू 5</div>
            <span class="box-prize">Win: रू 50</span>
            <button class="btn-join" onclick="joinLuckyDraw(5, 50, 'Bronze')">JOIN NOW</button>
        </div>

        <div class="lucky-box box-20">
            <span class="box-icon">💎</span>
            <div class="box-title">Silver Box</div>
            <div class="box-price">Entry: रू 20</div>
            <span class="box-prize">Win: रू 80</span>
            <button class="btn-join" onclick="joinLuckyDraw(20, 80, 'Silver')">JOIN NOW</button>
        </div>

        <div class="lucky-box box-50">
            <span class="box-icon">👑</span>
            <div class="box-title">Gold Box</div>
            <div class="box-price">Entry: रू 50</div>
            <span class="box-prize">Win: रू 130</span>
            <button class="btn-join" onclick="joinLuckyDraw(50, 130, 'Gold')">JOIN NOW</button>
        </div>

        <div class="lucky-box box-100">
            <span class="box-icon">🔥</span>
            <div class="box-title">Diamond Box</div>
            <div class="box-price">Entry: रू 100</div>
            <span class="box-prize">Win: रू 200</span>
            <button class="btn-join" onclick="joinLuckyDraw(100, 200, 'Diamond')">JOIN NOW</button>
        </div>
    </div>

    <div class="history-card">
        <h3><i class="fas fa-history"></i> My Draw History</h3>
        <table>
            <thead>
                <tr>
                    <th>Box</th>
                    <th>Number</th>
                    <th>Result</th>
                </tr>
            </thead>
            <tbody id="historyBody">
                <tr><td colspan="3" style="text-align:center;">लोड हुँदैछ...</td></tr>
            </tbody>
        </table>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getAuth, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";
        import { getDatabase, ref, onValue, push, update, runTransaction, get, query, orderByChild, equalTo, limitToLast } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js";

        const firebaseConfig = {
            apiKey: "AIzaSyAGjZQaWHGJ2EFDIyIKdVKErk_UjnsxiZ8",
            authDomain: "mero-ludo.firebaseapp.com",
            projectId: "mero-ludo",
            storageBucket: "mero-ludo.firebasestorage.app",
            messagingSenderId: "1094014617347",
            appId: "1:1094014617347:web:348cec65cea83c5a8fcb36"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getDatabase(app);

        let currentBalance = 0;
        let userUID = "";
        let userName = "";

        onAuthStateChanged(auth, (user) => {
            if (user) {
                userUID = user.uid;
                // Fetch User Data
                onValue(ref(db, 'users/' + user.uid), (snap) => {
                    if (snap.exists()) {
                        userName = snap.val().name || "User";
                        currentBalance = snap.val().balance || 0;
                        document.getElementById('userBalance').innerText = "रू " + currentBalance.toFixed(2);
                    }
                });
                // Fetch History
                loadHistory();
            } else { window.location.href = "index.html"; }
        });

        async function loadHistory() {
            const historyRef = ref(db, 'luckyDrawHistory');
            onValue(historyRef, (snap) => {
                const tbody = document.getElementById('historyBody');
                tbody.innerHTML = "";
                let rows = [];
                snap.forEach(child => {
                    const d = child.val();
                    if (d.uid === userUID) {
                        rows.push(`<tr>
                            <td>${d.box}</td>
                            <td>${d.userNumber}</td>
                            <td class="${d.result === 'WIN' ? 'win-text' : 'loss-text'}">${d.result}</td>
                        </tr>`);
                    }
                });
                tbody.innerHTML = rows.reverse().slice(0, 10).join(''); // Only show last 10
                if (rows.length === 0) tbody.innerHTML = "<tr><td colspan='3' style='text-align:center;'>No history found</td></tr>";
            });
        }

        window.joinLuckyDraw = async (fee, winPrize, boxName) => {
            if (currentBalance < fee) {
                return Swal.fire({ icon: 'error', title: 'ब्यालेन्स पुगेन!', text: 'कृपया पहिले डिपोजिट गर्नुहोस्।' });
            }

            const { value: userNumber } = await Swal.fire({
                title: boxName + ' Box Entry',
                input: 'number',
                inputLabel: 'कुनै ५ अंकको नम्बर हाल्नुहोस्',
                inputPlaceholder: '12345',
                showCancelButton: true,
                confirmButtonText: 'Submit & Pay',
                confirmButtonColor: '#e67e22',
                inputValidator: (value) => {
                    if (!value) return 'नम्बर हाल्न अनिवार्य छ!';
                }
            });

            if (userNumber) {
                Swal.fire({ title: 'जाँच गर्दै...', allowOutsideClick: false, didOpen: () => Swal.showLoading() });

                try {
                    // १. एडमिनको गोप्य नम्बर तान्ने
                    const systemCodeSnap = await get(ref(db, 'settings/luckySystemCode'));
                    const systemNumber = String(systemCodeSnap.val() || "00000").trim();

                    const userRef = ref(db, 'users/' + userUID);
                    
                    // २. पैसा काट्ने
                    const payResult = await runTransaction(userRef, (userData) => {
                        if (userData && (userData.balance || 0) >= fee) {
                            userData.balance -= fee;
                            return userData;
                        }
                    });

                    if (payResult.committed) {
                        const isWin = (String(userNumber).trim() === systemNumber);

                        if (isWin) {
                            // Winner logic
                            await runTransaction(userRef, (userData) => {
                                if (userData) { userData.balance = (userData.balance || 0) + winPrize; }
                                return userData;
                            });
                        }

                        // ३. हिस्ट्री सेभ गर्ने
                        const historyKey = push(ref(db, 'luckyDrawHistory')).key;
                        await update(ref(db, `luckyDrawHistory/${historyKey}`), {
                            uid: userUID,
                            name: userName,
                            box: boxName,
                            userNumber: userNumber,
                            systemNumber: systemNumber, // Admin history को लागि डेटाबेस मा रहन्छ
                            result: isWin ? "WIN" : "LOSS",
                            prize: isWin ? winPrize : 0,
                            time: Date.now()
                        });

                        // ४. फाइनल रिजल्ट (गोप्य नम्बर नदेखाई)
                        if (isWin) {
                            Swal.fire({
                                icon: 'success',
                                title: 'बधाई छ!',
                                text: `तपाईँको नम्बर मिल्यो! रू ${winPrize} प्राप्त गर्नुभयो।`,
                                confirmButtonColor: '#27ae60'
                            });
                        } else {
                            Swal.fire({
                                icon: 'error',
                                title: 'अहँ मिलेन!',
                                text: `तपाईँले छान्नुभएको नम्बर (${userNumber}) र लक्की नम्बर मिलेन।`,
                                footer: 'अर्को पटक फेरि प्रयास गर्नुहोस्!'
                            });
                        }
                    }
                } catch (error) {
                    Swal.fire('Error', 'प्राविधिक समस्या आयो!', 'error');
                }
            }
        };
    </script>
</body>
</html>
